name: Build and Deploy Medusa to EU Production

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: geely-medusajs
  ECR_REGISTRY: 891377086087.dkr.ecr.eu-central-1.amazonaws.com
  SERVICE_NAME: geely-medusajs
  TAG: production

on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Fetch environment variables from Secrets Manager
        run: |
          aws secretsmanager get-secret-value \
          --secret-id production/geely-medusajs \
          --region eu-central-1 \
          --query SecretString \
          --output text > .env

      - name: Build Docker image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .

      - name: Tag Docker image
        run: |
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
          $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.TAG }}

      - name: Push Docker images to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.TAG }}

  deploy_production:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_REGION: eu-central-1
          ECR_REPOSITORY: geely-medusajs
          ECR_REGISTRY: 891377086087.dkr.ecr.eu-central-1.amazonaws.com
          SERVICE_NAME: geely-medusajs
          IMAGE_TAG: ${{ github.sha }}

        with:
          host: ${{ secrets.AWS_PROD_HOST_EU }}
          username: ${{ secrets.AWS_PROD_USER }}
          key: ${{ secrets.AWS_PROD_PRIV_KEY_EU }}

          # THIS LINE FIXES YOUR ISSUE
          envs: AWS_REGION,ECR_REPOSITORY,ECR_REGISTRY,SERVICE_NAME,IMAGE_TAG

          script: |
            echo "Logging into ECR..."

            aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin $ECR_REGISTRY

            NEW_IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
            SERVICE_FILE=/etc/systemd/system/$SERVICE_NAME.service

            echo "Deploying image: $NEW_IMAGE"

            sudo sed -i "s|$ECR_REGISTRY/$ECR_REPOSITORY:[a-zA-Z0-9_\.\-]*|$NEW_IMAGE|g" $SERVICE_FILE

            docker pull $NEW_IMAGE

            sudo systemctl daemon-reload
            sudo systemctl restart $SERVICE_NAME

            echo "Deployment completed successfully."
